kind = "web"
previewPath = "/"
title = "D8Advisr"
version = "1.0.0"
id = "artifacts/d8advisr"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20948
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/d8advisr run dev"

[services.env]
PORT = "20948"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/d8advisr", "run", "build"]
publicDir = "artifacts/d8advisr/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
